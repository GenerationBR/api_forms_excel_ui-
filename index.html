<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição | Experiência Minimalista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 520px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .radio-option input {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>

<div class="form-container">
    <header>
        <h1>Formulário de Candidatura</h1>
        <p class="subtitle">Preencha os dados abaixo para prosseguirmos.</p>
    </header>

    <form action="#" method="POST">
        <div class="input-group">
            <label for="nome">Qual o seu nome?</label>
            <input type="text" id="nome" name="entry.1378000373" placeholder="Seu nome completo" required>
        </div>

        <div class="input-group">
            <label for="idade">Qual a sua idade?</label>
            <input type="number" id="idade" name="entry.1225650832" placeholder="Ex: 25" min="0" required>
        </div>

        <div class="input-group">
            <label for="experiencia">Conte um pouco da sua experiência</label>
            <textarea id="experiencia" name="entry.762545937" rows="4" placeholder="Descreva suas habilidades e projetos..."></textarea>
        </div>

        <div class="input-group">
            <label>Você tem interesse em participar?</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="entry.1204051764" value="Sim" checked> Sim
                </label>
                <label class="radio-option">
                    <input type="radio" name="entry.1204051764" value="Não"> Não
                </label>
            </div>
        </div>

        <button type="submit">Enviar Resposta</button>
    </form>

    <div class="footer-note">
        Suas informações estão seguras conosco.
    </div>
</div>

</body>
</html>
