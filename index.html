<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação | Spatial UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --accent: #6366f1;
            --text-main: #1e293b;
            --text-secondary: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #e0e7ff 0%, #f8fafc 50%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        /* Efeito de Vidro (Glassmorphism) */
        .spatial-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 540px;
            padding: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 
                        0 1px 3px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s ease;
        }

        .spatial-card:hover {
            transform: translateY(-5px);
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .field-group {
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 14px 18px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Escala de Satisfação 0-10 */
        .satisfaction-scale {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            margin-top: 8px;
        }

        .scale-item {
            flex: 1;
            text-align: center;
        }

        .scale-item input {
            display: none;
        }

        .scale-item label {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 400;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .scale-item input:checked + label {
            background: var(--accent);
            color: white;
            font-weight: 600;
            transform: scale(1.1);
        }

        /* Switch Customizado */
        .choice-group {
            display: flex;
            gap: 12px;
        }

        .choice-btn {
            flex: 1;
        }

        .choice-btn input {
            display: none;
        }

        .choice-btn label {
            display: block;
            padding: 12px;
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .choice-btn input:checked + label {
            background: #10b981;
            color: white;
        }

        .choice-btn input[value="Não"]:checked + label {
            background: #ef4444;
        }

        button.submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
            transition: all 0.2s;
        }

        button.submit-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        @media (max-width: 480px) {
            .spatial-card { padding: 24px; }
            .satisfaction-scale { flex-wrap: wrap; }
            .scale-item { flex: 0 0 18%; }
        }
    </style>
</head>
<body>

<div class="spatial-card">
    <header>
        <h1>Pesquisa de satisfação</h1>
        <p class="subtitle">Sua opinião ajuda a moldar nosso futuro.</p>
    </header>

    <form>
        <div class="field-group">
            <label for="nome">Informe seu nome</label>
            <input type="text" id="nome" placeholder="Como podemos te chamar?" required>
        </div>

        <div class="field-group">
            <label>Sua satisfação com o aplicativo (0 a 10)</label>
            <div class="satisfaction-scale">
                <div class="scale-item"><input type="radio" name="score" id="s0" value="0"><label for="s0">0</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s1" value="1"><label for="s1">1</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s2" value="2"><label for="s2">2</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s3" value="3"><label for="s3">3</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s4" value="4"><label for="s4">4</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s5" value="5" checked><label for="s5">5</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s6" value="6"><label for="s6">6</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s7" value="7"><label for="s7">7</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s8" value="8"><label for="s8">8</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s9" value="9"><label for="s9">9</label></div>
                <div class="scale-item"><input type="radio" name="score" id="s10" value="10"><label for="s10">10</label></div>
            </div>
        </div>

        <div class="field-group">
            <label for="exp">Explique como foi sua experiência</label>
            <textarea id="exp" rows="3" placeholder="O que você mais gostou ou o que podemos melhorar?"></textarea>
        </div>

        <div class="field-group">
            <label>Você indicaria o aplicativo para outra pessoa?</label>
            <div class="choice-group">
                <div class="choice-btn">
                    <input type="radio" name="refer" id="yes" value="Sim" checked>
                    <label for="yes">Sim, com certeza</label>
                </div>
                <div class="choice-btn">
                    <input type="radio" name="refer" id="no" value="Não">
                    <label for="no">Não no momento</label>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn">Enviar Feedback</button>
    </form>
</div>

</body>
</html>
